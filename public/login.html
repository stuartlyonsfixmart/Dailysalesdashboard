<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixmart — Sales Orders</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --lime: #9ACD00; --lime-dark: #7aaa00;
    --black: #1a1a1a; --white: #fff;
    --offwhite: #f5f5f3; --border: #e0e0e0;
    --muted: #666;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Barlow', sans-serif; background: var(--offwhite); color: var(--black); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-wrap { width: 400px; }
  .login-header { margin-bottom: 32px; }
  .login-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .logo-img { height: 28px; width: auto; }
  .login-title { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 800; letter-spacing: 0.02em; text-transform: uppercase; color: var(--black); line-height: 1; }
  .login-title span { color: var(--lime-dark); }
  .login-sub { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .login-card { background: var(--white); border: 1px solid var(--border); border-top: 3px solid var(--lime); padding: 32px; }
  .field { margin-bottom: 20px; }
  .field label { display: block; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .field input { width: 100%; background: var(--offwhite); border: 1px solid var(--border); color: var(--black); font-family: 'Barlow', sans-serif; font-size: 14px; padding: 9px 12px; outline: none; transition: border-color 0.15s; border-radius: 3px; }
  .field input:focus { border-color: var(--lime-dark); background: #fff; }
  .login-btn { width: 100%; background: var(--lime); border: none; color: var(--black); font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; padding: 11px; cursor: pointer; margin-top: 4px; border-radius: 3px; transition: background 0.15s; }
  .login-btn:hover { background: var(--lime-dark); }
  .error-msg { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; font-size: 12px; padding: 10px 12px; margin-bottom: 20px; border-radius: 3px; display: none; }
  .error-msg.show { display: block; }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-header">
    <div class="login-logo">
      <svg class="logo-img" viewBox="0 0 168 34" height="30" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Fixmart"><rect x="0" y="2" width="30" height="30" rx="7" fill="#9ACD00"/><text x="15" y="25" font-family="'Barlow Condensed',sans-serif" font-size="24" font-weight="800" fill="#1a1a1a" text-anchor="middle">f</text><text x="40" y="26" font-family="'Barlow Condensed',sans-serif" font-size="23" font-weight="800" letter-spacing="0.5" fill="#1a1a1a">fixmart</text></svg>
    </div>
    <div class="login-title">Sales <span>Orders</span></div>
    <div class="login-sub">Orders taken · order-book basis · restricted access</div>
  </div>
  <div class="login-card">
    <div class="error-msg" id="err">Incorrect username or password. Please try again.</div>
    <form method="POST" action="/login">
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" autocomplete="username" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="login-btn">Sign In</button>
    </form>
  </div>
</div>
<script>
  if (window.location.search.includes('error=1')) {
    document.getElementById('err').classList.add('show');
  }
</script>
</body>
</html>

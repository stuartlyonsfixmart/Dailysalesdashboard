<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixmart Sales Orders · Germany</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --lime: #9ACD00; --lime-dark: #7aaa00;
    --black: #1a1a1a; --white: #fff;
    --offwhite: #f5f5f3; --border: #e0e0e0;
    --muted: #666; --surface: #fff; --grey: #9a9a9a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Barlow', sans-serif; background: var(--offwhite); color: var(--black); }

  .header { background: var(--black); padding: 0 28px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; border-bottom: 3px solid var(--lime); }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo-img { height: 30px; width: auto; }
  .header-div { width: 1px; height: 26px; background: rgba(255,255,255,0.15); }
  .header-title { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.45); letter-spacing: 0.1em; text-transform: uppercase; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .basis-badge { background: rgba(154,205,0,0.15); border: 1px solid rgba(154,205,0,0.4); color: var(--lime); font-size: 10px; font-weight: 700; font-family: 'Barlow Condensed', sans-serif; padding: 3px 9px; border-radius: 3px; letter-spacing: 0.08em; text-transform: uppercase; }
  .last-updated { color: rgba(255,255,255,0.3); font-size: 11px; font-family: 'DM Mono', monospace; }
  .logout-link { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.4); text-decoration: none; text-transform: uppercase; letter-spacing: 0.08em; padding: 6px 12px; border: 1px solid rgba(255,255,255,0.15); border-radius: 4px; }
  .logout-link:hover { color: rgba(255,255,255,0.8); }

  .main { padding: 16px 24px; max-width: 1500px; margin: 0 auto; }

  .filters-bar { background: var(--black); border-radius: 6px; padding: 10px 16px; display: flex; align-items: center; gap: 14px; margin-bottom: 14px; flex-wrap: wrap; }
  .filter-label { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.1em; white-space: nowrap; }
  .filter-select { font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 500; color: #fff; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 4px; padding: 4px 9px; cursor: pointer; outline: none; }
  .filter-select option { background: #333; }
  .filter-group { display: flex; align-items: center; gap: 7px; }
  .filter-div { width: 1px; height: 20px; background: rgba(255,255,255,0.1); }
  .toggle { display: flex; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 4px; overflow: hidden; }
  .toggle-btn { padding: 4px 12px; font-size: 12px; font-weight: 700; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.05em; cursor: pointer; color: rgba(255,255,255,0.45); background: transparent; border: none; }
  .toggle-btn.active { background: var(--lime); color: var(--black); }

  /* SMALL MULTIPLES */
  .sparks { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 14px; }
  .spark-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; }
  .spark-title { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }
  .spark-val { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 800; color: var(--black); line-height: 1.1; margin-top: 2px; }
  .spark-val small { font-size: 12px; font-weight: 600; color: var(--muted); }
  .spark-svg { width: 100%; height: 46px; display: block; margin-top: 6px; }

  /* TABLE */
  .table-bar { background: var(--black); border-radius: 6px 6px 0 0; padding: 9px 16px; display: flex; align-items: center; justify-content: space-between; }
  .table-bar-title { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: 0.07em; }
  .table-count { font-size: 11px; color: rgba(255,255,255,0.45); font-family: 'DM Mono', monospace; }
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-top: none; border-radius: 0 0 6px 6px; overflow: hidden; }
  .table-scroll { overflow-y: auto; max-height: calc(100vh - 340px); }
  .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .data-table thead { background: #f0f0ee; position: sticky; top: 0; z-index: 10; }
  .data-table thead th { padding: 8px 12px; text-align: left; font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; white-space: nowrap; border-bottom: 2px solid var(--lime); }
  .data-table thead th.right { text-align: right; }
  .data-table tbody tr { border-bottom: 1px solid var(--border); }
  .data-table tbody tr:hover { background: #fafaf8; }
  .data-table tbody tr.weekend td { color: var(--muted); background: #fbfbf9; }
  .data-table td { padding: 7px 12px; vertical-align: middle; }
  .data-table td.right { text-align: right; }
  .data-table td.date { font-weight: 600; white-space: nowrap; }
  .data-table td.dow { color: var(--muted); font-size: 11px; }
  .mono { font-family: 'DM Mono', monospace; }
  .gp-good { color: var(--lime-dark); font-weight: 600; }
  .data-table tfoot .total-row { background: var(--black); position: sticky; bottom: 0; }
  .data-table tfoot td { padding: 9px 12px; font-family: 'DM Mono', monospace; font-weight: 700; color: #fff; font-size: 14px; }
  .data-table tfoot td.right { text-align: right; }
  .data-table tfoot td.lime { color: var(--lime); }

  .loading { display: flex; align-items: center; justify-content: center; height: 180px; font-size: 13px; color: var(--muted); gap: 10px; }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--lime); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .err { color: #dc2626; font-size: 13px; padding: 16px; }

  .nav { background: #111; padding: 0 28px; display: flex; border-bottom: 1px solid #333; }
  .nav-link { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.4); text-decoration: none; padding: 10px 16px; text-transform: uppercase; letter-spacing: 0.08em; border-bottom: 3px solid transparent; transition: all 0.15s; }
  .nav-link:hover { color: rgba(255,255,255,0.7); }
  .nav-link.active { color: var(--lime); border-bottom-color: var(--lime); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <svg class="logo-img" viewBox="0 0 168 34" height="30" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Fixmart"><rect x="0" y="2" width="30" height="30" rx="7" fill="#9ACD00"/><text x="15" y="25" font-family="'Barlow Condensed',sans-serif" font-size="24" font-weight="800" fill="#1a1a1a" text-anchor="middle">f</text><text x="40" y="26" font-family="'Barlow Condensed',sans-serif" font-size="23" font-weight="800" letter-spacing="0.5" fill="#f5f5f3">fixmart</text></svg>
    <div class="header-div"></div>
    <div class="header-title">Sales Orders · Germany (GmbH)</div>
  </div>
  <div class="header-right">
    <div class="basis-badge">Germany: invoiced orders · converted to GBP</div>
    <div class="last-updated" id="freshness">Loading…</div>
    <a href="/logout" class="logout-link">Log out</a>
  </div>
</div>


<div class="nav">
  <a href="/index.html" class="nav-link" id="nav-table">UK · Daily Table</a>
  <a href="/charts.html" class="nav-link" id="nav-charts">UK · Charts</a>
  <a href="/germany.html" class="nav-link active" id="nav-germany">Germany (GmbH)</a>
  <a href="/combined.html" class="nav-link" id="nav-combined">Combined (UK + GmbH)</a>
</div>

<div class="main">

  <div class="filters-bar">
    <div class="filter-group">
      <span class="filter-label">Period</span>
      <div class="toggle" style="margin-right:4px">
        <button class="toggle-btn active" id="preset-mtd" onclick="setMTD()">MTD</button>
        <button class="toggle-btn" onclick="setPreset(4)">4w</button>
        <button class="toggle-btn" onclick="setPreset(13)">13w</button>
        <button class="toggle-btn" onclick="setPreset(26)">26w</button>
        <button class="toggle-btn" onclick="setPreset(52)">52w</button>
        <button class="toggle-btn" id="preset-ytd" onclick="setYTD()">YTD</button>
      </div>
    </div>
    <div class="filter-div"></div>
    <div class="filter-group">
      <span class="filter-label">From</span>
      <input type="date" class="filter-select" id="date-from" onchange="onDateChange()" style="cursor:pointer">
    </div>
    <div class="filter-group">
      <span class="filter-label">To</span>
      <input type="date" class="filter-select" id="date-to" onchange="onDateChange()" style="cursor:pointer">
    </div>
  </div>

  <div class="sparks" id="sparks"></div>

  <div class="table-bar">
    <div class="table-bar-title">Daily Orders — Germany (GmbH)</div>
    <div class="table-count" id="table-count">Loading…</div>
  </div>
  <div class="table-wrap">
    <div id="content">
      <div class="loading"><div class="spinner"></div> Loading from BigQuery…</div>
    </div>
  </div>

</div>
<script src="state.js"></script>
<script src="germany.js"></script>
</body>
</html>
